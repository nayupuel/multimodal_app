{% extends "layout.html" %}

{% block title %}본인 인증{% endblock %}
{% block header %}본인 인증{% endblock %}

{% block content %}
<p class="description">
    입출금 알림 서비스 신청을 위해<br>본인 확인 정보를 입력해 주세요.
</p>

<form id="auth-form" action="/auth" method="POST">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    
    <div class="form-group">
        <label>사용자 구분</label>
        <div class="radio-group">
            <input type="radio" id="user-type-personal" name="userType" value="personal" checked>
            <label for="user-type-personal">개인</label>
            
            <input type="radio" id="user-type-corporate" name="userType" value="corporate">
            <label for="user-type-corporate">사업자</label>
        </div>
    </div>

    <div class="form-group">
        <label for="user-name">이름 (법인명)</label>
        <input type="text" id="user-name" name="userName" required>
    </div>

    <div class="form-group">
        <label for="birth-date">생년월일 (사업자번호 앞 6자리)</label>
        <input type="text" id="birth-date" name="birthDate" placeholder="예: 900101" maxlength="6" pattern="\d{6}" required>
    </div>

    <div class="form-group">
        <label for="account-number">출금 계좌번호</label>
        <input type="text" id="account-number" name="accountNumber" placeholder="'-' 없이 숫자만 입력" pattern="[\d-]+" required>
    </div>

    <div class="form-group">
        <label for="account-password">계좌 비밀번호</label>
        <input type="password" id="account-password" name="accountPassword" maxlength="4" pattern="\d{4}" placeholder="숫자 4자리" required>
    </div>

    <div class="button-group">
        <button type="submit" class="btn btn-primary">다음</button>
    </div>
</form>

<div id="error-message" class="message-error hidden"></div>
{% endblock %}

{% block extra_js %}
<script>
    document.getElementById('auth-form').addEventListener('submit', function(event) {
        event.preventDefault();
        const form = event.target;
        const formData = new FormData(form);
        const errorDiv = document.getElementById('error-message');

        // 서버로 인증 요청
        fetch(form.action, {
            method: 'POST',
            body: formData
        })
        .then(response => response.json())
        .then(data => {
            if (data.success) {
                // 인증 성공 시 서버가 지정한 URL로 이동
                window.location.href = data.redirect_url;
            } else {
                // 인증 실패 시 오류 메시지 표시
                errorDiv.textContent = data.reason || '인증에 실패했습니다. 다시 시도해 주세요.';
                errorDiv.classList.remove('hidden');
            }
        })
        .catch(error => {
            console.error('Error:', error);
            errorDiv.textContent = '오류가 발생했습니다. 잠시 후 다시 시도해 주세요.';
            errorDiv.classList.remove('hidden');
        });
    });
</script>
{% endblock %}
