{% extends "layout.html" %}

{% block title %}입출금 알림 서비스 신청{% endblock %}
{% block header %}알림 서비스 상세 설정{% endblock %}

{% block content %}
<p class="description">
    알림 받으실 서비스 내용을 상세하게 설정하고<br>약관 동의 후 신청을 완료해 주세요.
</p>

<form id="apply-form" action="{{ url_for('main.apply', account_id=account.AccountID) }}" method="POST">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

    <div class="form-group">
        <label>알림 채널</label>
        <div class="radio-group">
            <input type="radio" id="channel-sms" name="channel" value="sms" checked>
            <label for="channel-sms">SMS (유료)</label>
            <input type="radio" id="channel-push" name="channel" value="push">
            <label for="channel-push">앱 푸시 (무료)</label>
        </div>
    </div>
    
    <div class="form-group">
        <label for="phone-number">휴대폰 번호</label>
        <input type="tel" id="phone-number" name="phoneNumber" placeholder="'-' 없이 숫자만 입력" pattern="\d+" required>
    </div>

    <div class="form-group">
        <label>입출금 알림</label>
        <div class="checkbox-group-vertical">
            <div class="checkbox-item"><input type="checkbox" id="notify-deposit" name="notify_type" value="deposit" checked><label for="notify-deposit">입금 시</label></div>
            <div class="checkbox-item"><input type="checkbox" id="notify-withdrawal" name="notify_type" value="withdrawal" checked><label for="notify-withdrawal">출금 시</label></div>
        </div>
    </div>
    
    <div class="form-group">
        <label>잔액 표시</label>
        <div class="radio-group">
            <input type="radio" id="balance-on" name="show_balance" value="yes" checked>
            <label for="balance-on">표시함</label>
            <input type="radio" id="balance-off" name="show_balance" value="no">
            <label for="balance-off">표시 안 함</label>
        </div>
    </div>

    <div class="form-group">
        <label>알림 시간 설정</label>
        <div class="radio-group">
            <input type="radio" id="time-all" name="notify_time" value="all_day" checked>
            <label for="time-all">24시간</label>
            <input type="radio" id="time-custom" name="notify_time" value="custom">
            <label for="time-custom">시간 지정</label>
        </div>
        <div id="custom-time-inputs" class="hidden" style="margin-top: 10px; display: flex; align-items: center; gap: 10px;">
            <input type="time" id="start-time" name="start_time" value="09:00">
            <span>-</span>
            <input type="time" id="end-time" name="end_time" value="18:00">
        </div>
    </div>

    <div class="checkbox-group">
        <div class="checkbox-item"><input type="checkbox" id="agree-personal" name="agreePersonal" required><label for="agree-personal">개인(신용)정보 수집·이용 동의 (필수)</label></div>
        <div class="checkbox-item"><input type="checkbox" id="agree-service" name="agreeService" required><label for="agree-service">서비스 이용약관 동의 (필수)</label></div>
    </div>

    <div class="button-group">
        <button type="button" id="prev-btn" class="btn btn-secondary">이전</button>
        <button type="submit" class="btn btn-primary">신청하기</button>
    </div>
</form>

<div id="result-message" class="hidden"></div>
{% endblock %}

{% block extra_js %}
<script>
document.addEventListener('DOMContentLoaded', function () {
    // 이전 버튼 이벤트 처리
    const prevBtn = document.getElementById('prev-btn');
    if (prevBtn) {
        prevBtn.addEventListener('click', function() {
            window.location.href = '{{ url_for("main.accounts") }}';
        });
    }

    const timeRadios = document.querySelectorAll('input[name="notify_time"]');
    const customTimeInputs = document.getElementById('custom-time-inputs');
    const form = document.getElementById('apply-form');
    const resultMessage = document.getElementById('result-message');

    timeRadios.forEach(radio => {
        radio.addEventListener('change', function() {
            if (this.value === 'custom') {
                customTimeInputs.style.display = 'flex';
            } else {
                customTimeInputs.style.display = 'none';
            }
        });
    });

    form.addEventListener('submit', function(event) {
        event.preventDefault();
        
        const formData = new FormData(form);

        fetch(form.action, {
            method: 'POST',
            body: new URLSearchParams(formData),
            headers: {
                'Content-Type': 'application/x-www-form-urlencoded',
            },
        })
        .then(response => response.json())
        .then(data => {
            resultMessage.textContent = data.message;
            resultMessage.className = data.success ? 'alert alert-success' : 'alert alert-danger';
            
            if (data.success) {
                form.style.display = 'none';
                setTimeout(() => {
                    window.location.href = '/'; 
                }, 2000);
            }
        })
        .catch(error => {
            console.error('Error:', error);
            resultMessage.textContent = '오류가 발생했습니다. 잠시 후 다시 시도해주세요.';
            resultMessage.className = 'alert alert-danger';
        });
    });
});
</script>
{% endblock %}
